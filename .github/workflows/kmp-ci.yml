name: KMP CI Build

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  workflow_dispatch:

env:
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4096M -Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.caching=true"

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Create local.properties
        run: |
          echo "YANDEX_DICTIONARY_API_KEY=${{ secrets.YANDEX_DICTIONARY_API_KEY }}" > local.properties

      - name: Run tests
        run: ./gradlew :composeApp:testDebugUnitTest :shared:testDebugUnitTest :composeApp:jvmTest :shared:jvmTest

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: "**/build/reports/tests/"
          if-no-files-found: ignore

  lint:
    name: Code Linting (detekt)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Create local.properties
        run: |
          echo "YANDEX_DICTIONARY_API_KEY=${{ secrets.YANDEX_DICTIONARY_API_KEY }}" > local.properties

      - name: Run detekt on all source sets
        run: ./gradlew detekt

      - name: Upload detekt reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detekt-reports
          path: "**/build/reports/detekt/"
          if-no-files-found: ignore

  build-android:
    name: Build Android Debug APK
    runs-on: ubuntu-latest
    needs: [test, lint]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Create local.properties
        run: |
          echo "YANDEX_DICTIONARY_API_KEY=${{ secrets.YANDEX_DICTIONARY_API_KEY }}" > local.properties

      - name: Build APK
        run: ./gradlew :composeApp:assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: composeApp/build/outputs/apk/debug/*.apk
          if-no-files-found: error

  build-ios:
    name: Build iOS Simulator Framework
    runs-on: macos-latest
    needs: [test, lint]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Create local.properties
        run: |
          echo "YANDEX_DICTIONARY_API_KEY=${{ secrets.YANDEX_DICTIONARY_API_KEY }}" > local.properties

      - name: Build iOS framework
        run: ./gradlew :shared:linkDebugFrameworkIosSimulatorArm64
